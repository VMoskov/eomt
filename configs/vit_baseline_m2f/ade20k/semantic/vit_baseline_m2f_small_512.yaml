trainer:
  max_epochs: 120
  precision: "bf16-mixed"
  gradient_clip_val: 0.1
  strategy: ddp_find_unused_parameters_true
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: /lustre/home/vmoskov/checkpoints/ade20k_vit_baseline_m2f_small
        save_top_k: 1
        monitor: metrics/val_iou_all
        mode: max
        filename: best-{epoch:02d}
        save_last: true
  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      resume: allow
      project: "eomt"
      name: "ade20k_semantic_vit_baseline_m2f_small_512"
model:
  class_path: training.mask_classification_semantic.MaskClassificationSemantic
  init_args:
    attn_mask_annealing_enabled: False
    windowed_inference: true
    num_classes: 150
    img_size: [512, 512]
    lr: 1.0e-4
    llrd: 0.8
    llrd_l2_enabled: False
    network:
      class_path: models.vit_baseline_m2f.ViTBaselineM2F
      init_args:
        backbone_name: vit_small_patch14_reg4_dinov2
        img_size: [512, 512]
        patch_size: 14
        num_classes: 150
        num_queries: 100
        feature_size: 256
        hidden_dim: 256
        encoder_layers: 6
        decoder_layers: 10
        dropout: 0.0
data:
  class_path: datasets.ade20k_semantic.ADE20KSemantic
  init_args:
    img_size: [512, 512]
    batch_size: 4
