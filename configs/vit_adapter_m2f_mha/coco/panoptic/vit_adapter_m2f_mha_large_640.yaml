trainer:
  max_epochs: 24
  precision: "16-mixed"
  gradient_clip_val: 0.1
  strategy: ddp_find_unused_parameters_true
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: /lustre/home/vmoskov/checkpoints/coco_vit_adapter_m2f_mha_large
        save_top_k: 1
        monitor: metrics/val_pq_all
        mode: max
        filename: best-{epoch:02d}
        save_last: true
  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      resume: allow
      project: "eomt"
      name: "coco_panoptic_vit_adapter_m2f_mha_large_640"
model:
  class_path: training.mask_classification_panoptic.MaskClassificationPanoptic
  init_args:
    attn_mask_annealing_enabled: False
    num_classes: 133
    img_size: [640, 640]
    stuff_classes: [80, 81, 82, 83, 84, 85, 86, 87, 88, 89, 90, 91, 92, 93, 94, 95, 96, 97, 98, 99, 100, 101, 102, 103, 104, 105, 106, 107, 108, 109, 110, 111, 112, 113, 114, 115, 116, 117, 118, 119, 120, 121, 122, 123, 124, 125, 126, 127, 128, 129, 130, 131, 132]
    lr: 1.0e-4
    llrd: 0.8
    llrd_l2_enabled: False
    network:
      class_path: models.vit_adapter_m2f_mha.ViTAdapterMHAM2F
      init_args:
        backbone_name: vit_large_patch14_reg4_dinov2
        img_size: [640, 640]
        num_classes: 133
        num_queries: 200
        inplanes: 64
        num_heads: 8
        init_values: 0.0
        interaction_indexes: [[0, 5], [6, 11], [12, 17], [18, 23]]
        with_cffn: True
        cffn_ratio: 0.25
        add_vit_feature: True
        use_extra_extractor: True
        drop_path_rate: 0.0
        feature_size: 256
        hidden_dim: 256
        encoder_layers: 6
        decoder_layers: 10
        dropout: 0.0
data:
  class_path: datasets.coco_panoptic.COCOPanoptic
  init_args:
    stuff_classes: [80, 81, 82, 83, 84, 85, 86, 87, 88, 89, 90, 91, 92, 93, 94, 95, 96, 97, 98, 99, 100, 101, 102, 103, 104, 105, 106, 107, 108, 109, 110, 111, 112, 113, 114, 115, 116, 117, 118, 119, 120, 121, 122, 123, 124, 125, 126, 127, 128, 129, 130, 131, 132]
