trainer:
  max_epochs: 62
  precision: "32-true"
  gradient_clip_val: 0.1
  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      resume: allow
      project: "eomt"
      name: "ade20k_semantic_vit_adapter_m2f_small_512"
model:
  class_path: training.mask_classification_semantic.MaskClassificationSemantic
  init_args:
    attn_mask_annealing_enabled: False
    num_classes: 150
    img_size: [512, 512]
    lr: 1.0e-4
    llrd: 0.8
    llrd_l2_enabled: False
    network:
      class_path: models.vit_adapter_m2f.ViTAdapterM2F
      init_args:
        backbone_name: vit_small_patch14_reg4_dinov2
        img_size: [512, 512]
        num_classes: 150
        num_queries: 100
        inplanes: 64
        num_heads: 8
        init_values: 0.0
        interaction_indexes: [[0, 2], [3, 5], [6, 8], [9, 11]]
        with_cffn: True
        cffn_ratio: 0.25
        add_vit_feature: True
        use_extra_extractor: True
        drop_path_rate: 0.0
        feature_size: 256
        hidden_dim: 256
        encoder_layers: 6
        decoder_layers: 10
        dropout: 0.0
data:
  class_path: datasets.ade20k_semantic.ADE20KSemantic
