trainer:
  max_epochs: 63
  precision: "bf16-mixed"
  gradient_clip_val: 0.01
  strategy: ddp_find_unused_parameters_true
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: /lustre/home/vmoskov/checkpoints/ade20k_vit_adapter_m2f_large
        save_top_k: 1
        monitor: metrics/val_iou_all
        mode: max
        filename: best-{epoch:02d}
        save_last: true
  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      resume: allow
      project: "eomt"
      name: "ade20k_semantic_vit_adapter_m2f_large_640"
model:
  class_path: training.mask_classification_semantic.MaskClassificationSemantic
  init_args:
    attn_mask_annealing_enabled: False
    windowed_inference: false
    num_classes: 150
    img_size: [640, 640]
    lr: 2.0e-5
    llrd: 0.9
    llrd_l2_enabled: False
    network:
      class_path: models.vit_adapter_m2f.ViTAdapterM2F
      init_args:
        backbone_name: vit_large_patch14_reg4_dinov2
        img_size: [640, 640]
        num_classes: 150
        num_queries: 100
        inplanes: 64
        num_heads: 16
        init_values: 0.0
        interaction_indexes: [[0, 5], [6, 11], [12, 17], [18, 23]]
        with_cffn: True
        cffn_ratio: 0.25
        add_vit_feature: True
        use_extra_extractor: True
        drop_path_rate: 0.3
        feature_size: 256
        hidden_dim: 256
        encoder_layers: 6
        decoder_layers: 10
        dropout: 0.0
data:
  class_path: datasets.ade20k_semantic.ADE20KSemantic
  init_args:
    img_size: [640, 640]
    batch_size: 4
